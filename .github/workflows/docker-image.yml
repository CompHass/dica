name: Build and Push Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: eduhass/dica

jobs:
  build-scan-push:
    name: Build, scan, and push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::12}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0-${GITHUB_RUN_NUMBER}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image=${IMAGE_NAME}:${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sha_image=${IMAGE_NAME}:${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "latest_image=${IMAGE_NAME}:latest" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if printf '%s' "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Build image
        run: |
          docker build \
            --file ./Dockerfile \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --tag "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.sha_image }}" \
            --tag "${{ steps.meta.outputs.latest_image }}" \
            .

      - name: Scan image (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Push images
        run: |
          docker push "${{ steps.meta.outputs.image }}"
          docker push "${{ steps.meta.outputs.sha_image }}"
          docker push "${{ steps.meta.outputs.latest_image }}"

  update-manifests:
    name: Update kustomize manifests
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout iac repo
        uses: actions/checkout@v4
        with:
          repository: CompHass/iac
          token: ${{ secrets.IAC_DEPLOY_TOKEN }}
          ref: main

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update kustomization image tags
        env:
          TAG: ${{ needs.build-scan-push.outputs.version }}
        run: |
          FILE="manifests/dica/kustomization.yaml"

          yq -i '(.images[] | select(.name == "docker.io/eduhass/dica")).newTag = strenv(TAG)' "$FILE"

          echo "Updated $FILE to tag ${TAG}:"
          cat "$FILE"

      - name: Commit and push
        env:
          TAG: ${{ needs.build-scan-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/dica/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(dica): bump image tags to ${TAG} [skip ci]"
          git push origin main